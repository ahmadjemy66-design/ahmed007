<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجرنا - اكتشف منتجاتنا الممتازة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #08137b;
            --secondary-purple: #4f09a7;
            --neutral-light: #f5f5f0;
            --neutral-dark: #2d3748;
            --accent-gold: #c5a47e;
            --accent-red: #d32f2f;
            --white: #ffffff;
            --gradient-primary: linear-gradient(135deg, var(--primary-blue), var(--secondary-purple));
            --gradient-gold: linear-gradient(135deg, #c5a47e, #b8945a);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --border-radius: 16px;
            --border-radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--neutral-light);
            color: var(--neutral-dark);
            direction: rtl;
            cursor: none;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Custom Cursor */
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 1;
        }

        .custom-cursor::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--primary-blue);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                background: var(--primary-blue);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                background: var(--accent-gold);
            }
        }

        /* Hero Section */
        .shop-hero {
            background: var(--gradient-primary);
            color: var(--white);
            padding: 80px 0;
            text-align: center;
            margin-bottom: 60px;
            position: relative;
            overflow: hidden;
        }

        .shop-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .shop-hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .shop-hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
            animation: slideInDown 0.8s ease;
        }

        .shop-hero p {
            font-size: 1.4rem;
            opacity: 0.95;
            margin-bottom: 40px;
            animation: slideInUp 0.8s ease;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 50px;
            animation: slideInUp 1s ease;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: var(--border-radius);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Filters Section */
        .filters-section {
            background: var(--white);
            padding: 40px 0;
            margin-bottom: 40px;
            box-shadow: var(--shadow-sm);
        }

        .filters-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-weight: 600;
            color: var(--primary-blue);
            font-size: 0.95rem;
        }

        .filter-input, .filter-select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--white);
        }

        .filter-input:focus, .filter-select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(8, 19, 123, 0.1);
        }

        .category-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .category-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: var(--white);
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--gradient-primary);
            color: var(--white);
            border-color: var(--primary-blue);
        }

        .sort-options {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
        }

        .sort-label {
            font-weight: 600;
            color: var(--neutral-dark);
        }

        .sort-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: var(--white);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .sort-btn:hover, .sort-btn.active {
            background: var(--primary-blue);
            color: var(--white);
            border-color: var(--primary-blue);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .product-card {
            background: var(--white);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            position: relative;
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-xl);
            border-color: var(--secondary-purple);
        }

        .product-image {
            height: 250px;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-badges {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge-discount {
            background: #e74c3c;
            color: white;
        }

        .badge-featured {
            background: #ffd700;
            color: #333;
        }

        .badge-new {
            background: rgba(39, 174, 96, 0.9);
            color: white;
        }

        .wishlist-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--white);
            border: 2px solid #e0e0e0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 10;
        }

        .wishlist-btn:hover {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .wishlist-btn.active {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .product-info {
            padding: 25px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-category {
            color: var(--secondary-purple);
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .product-rating {
            color: #f39c12;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .product-description {
            color: var(--neutral-dark);
            opacity: 0.7;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 15px;
        }

        .current-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-blue);
        }

        .original-price {
            font-size: 1rem;
            text-decoration: line-through;
            color: #999;
        }

        .stock-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .stock-status.in-stock {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
        }

        .stock-status.low-stock {
            background: rgba(243, 156, 18, 0.1);
            color: #f39c12;
        }

        .stock-status.out-of-stock {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
        }

        .product-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: var(--white);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: var(--neutral-dark);
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        /* Load More */
        .load-more-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .load-more-btn {
            padding: 15px 40px;
            background: var(--gradient-primary);
            color: var(--white);
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
        }

        .load-more-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .load-more-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--neutral-dark);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            grid-column: 1 / -1;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-blue);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Quick View Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: modalFadeIn 0.3s ease-in;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: var(--shadow-xl);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2rem;
            color: #999;
            cursor: pointer;
            transition: var(--transition);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f8f9fa;
            border: none;
        }

        .modal-close:hover {
            color: var(--accent-red);
            background: #f1f3f4;
        }

        /* Success/Error Messages */
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideInDown 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }

            .shop-hero h1 {
                font-size: 2.8rem;
            }

            .hero-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }

            .shop-hero {
                padding: 60px 0;
            }

            .shop-hero h1 {
                font-size: 2.2rem;
            }

            .shop-hero p {
                font-size: 1.1rem;
            }

            .hero-stats {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .filters-container {
                grid-template-columns: 1fr;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .modal-content {
                padding: 25px;
                margin: 10px;
            }
        }

        @media (max-width: 480px) {
            .shop-hero h1 {
                font-size: 1.8rem;
            }

            .product-name {
                font-size: 1rem;
            }

            .filters-container {
                grid-template-columns: 1fr;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="custom-cursor" id="customCursor"></div>
    <div id="site-header"></div>

    <!-- Hero Section -->
    <section class="shop-hero">
        <div class="container">
            <div class="hero-content">
                <h1><i class="fas fa-shopping-bag"></i> متجرنا</h1>
                <p>اكتشف مجموعة متنوعة من المنتجات الممتازة بأسعار تنافسية</p>

                <div class="hero-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="totalProducts">200+</span>
                        <span class="stat-label">منتج متاح</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="satisfiedCustomers">5000+</span>
                        <span class="stat-label">عميل راضي</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="avgRating">4.5★</span>
                        <span class="stat-label">متوسط التقييم</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="deliveryTime">24 ساعة</span>
                        <span class="stat-label">سرعة التوصيل</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Filters Section -->
    <section class="filters-section">
        <div class="container">
            <div class="filters-container">
                <div class="filter-group">
                    <label class="filter-label">البحث</label>
                    <input type="text" id="searchInput" class="filter-input" placeholder="ابحث عن منتج...">
                </div>

                <div class="filter-group">
                    <label class="filter-label">الفئة</label>
                    <select id="categoryFilter" class="filter-select">
                        <option value="">جميع الفئات</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label">نطاق السعر</label>
                    <input type="range" id="priceRangeMin" class="filter-input" min="0" max="10000" value="0" style="padding: 0;">
                </div>

                <div class="filter-group">
                    <label class="filter-label">حتى</label>
                    <input type="number" id="priceMax" class="filter-input" min="0" max="10000" value="10000">
                </div>
            </div>

            <div class="category-filters" id="categoryQuickFilters"></div>

            <div class="sort-options">
                <span class="sort-label">ترتيب حسب:</span>
                <button class="sort-btn active" data-sort="latest">الأحدث</button>
                <button class="sort-btn" data-sort="price-low">السعر: من الأقل</button>
                <button class="sort-btn" data-sort="price-high">السعر: من الأعلى</button>
                <button class="sort-btn" data-sort="rating">الأعلى تقييماً</button>
                <button class="sort-btn" data-sort="best-sellers">الأكثر مبيعاً</button>
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <main class="container">
        <div class="products-grid" id="productsGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>جاري تحميل المنتجات...</p>
            </div>
        </div>

        <div class="load-more-container">
            <button class="load-more-btn" id="loadMoreBtn" id="loadMoreBtn" onclick="loadMoreProducts()">
                <i class="fas fa-plus"></i> عرض المزيد
            </button>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="/static/js/site-layout.js"></script>
    <script>
        let allProducts = [];
        let filteredProducts = [];
        let displayedProducts = [];
        let currentPage = 1;
        const itemsPerPage = 12;
        let currentSort = 'latest';

        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 300));
            document.getElementById('categoryFilter').addEventListener('change', applyFilters);
            document.getElementById('priceMax').addEventListener('input', applyFilters);

            // Sort buttons
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSort = this.dataset.sort;
                    sortProducts();
                    displayProducts();
                });
            });

            // Custom cursor
            document.addEventListener('mousemove', function(e) {
                const cursor = document.getElementById('customCursor');
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products.php?action=list_products&limit=200');
                const data = await response.json();

                if (data.success && Array.isArray(data.data)) {
                    allProducts = data.data;
                    applyFilters();
                    loadDefaultStats();
                } else {
                    showEmptyState('لا توجد منتجات متاحة حالياً');
                }
            } catch (error) {
                console.error('Error loading products:', error);
                showEmptyState('خطأ في تحميل المنتجات');
            }
        }

        function loadDefaultStats() {
            if (allProducts.length === 0) return;

            const totalProducts = allProducts.length;
            const avgRating = (allProducts.reduce((sum, p) => sum + (p.rating_average || 0), 0) / allProducts.length).toFixed(1);

            document.getElementById('totalProducts').textContent = formatNumber(totalProducts) + '+';
            document.getElementById('avgRating').textContent = avgRating + '★';

            // Load categories
            const categories = [...new Set(allProducts.map(p => ({ id: p.category_id, name: p.category_ar })).filter(p => p.id))];
            const categorySelect = document.getElementById('categoryFilter');
            const categoryQuickFilters = document.getElementById('categoryQuickFilters');

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id || '';
                option.textContent = cat.name || 'أخرى';
                categorySelect.appendChild(option);

                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = cat.name || 'أخرى';
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    categorySelect.value = cat.id || '';
                    applyFilters();
                });
                categoryQuickFilters.appendChild(btn);
            });
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const categoryId = document.getElementById('categoryFilter').value;
            const maxPrice = parseInt(document.getElementById('priceMax').value);

            filteredProducts = allProducts.filter(product => {
                const matchesSearch = !search || 
                    product.name_ar.toLowerCase().includes(search) ||
                    (product.description_ar && product.description_ar.toLowerCase().includes(search));

                const matchesCategory = !categoryId || product.category_id == categoryId;
                const matchesPrice = product.price <= maxPrice;

                return matchesSearch && matchesCategory && matchesPrice;
            });

            sortProducts();
            currentPage = 1;
            displayProducts();
        }

        function sortProducts() {
            switch (currentSort) {
                case 'price-low':
                    filteredProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    filteredProducts.sort((a, b) => b.price - a.price);
                    break;
                case 'rating':
                    filteredProducts.sort((a, b) => (b.rating_average || 0) - (a.rating_average || 0));
                    break;
                case 'best-sellers':
                    filteredProducts.sort((a, b) => (b.rating_count || 0) - (a.rating_count || 0));
                    break;
                default: // latest
                    filteredProducts.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
            }
        }

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            const startIndex = 0;
            const endIndex = currentPage * itemsPerPage;
            displayedProducts = filteredProducts.slice(startIndex, endIndex);

            if (displayedProducts.length === 0) {
                showEmptyState('لا توجد نتائج تطابق بحثك');
                return;
            }

            grid.innerHTML = displayedProducts.map((product, index) => {
                const discountedPrice = product.price * (1 - (product.discount_percent || 0) / 100);
                const stockStatus = product.stock_quantity === 0 ? 'out-of-stock' :
                    product.stock_quantity <= 5 ? 'low-stock' : 'in-stock';
                const stockText = product.stock_quantity === 0 ? 'غير متوفر' :
                    product.stock_quantity <= 5 ? `متبقي: ${product.stock_quantity}` : 'متوفر';

                return `
                    <div class="product-card fade-in" style="animation-delay: ${index * 0.1}s">
                        <div class="product-image">
                            <img src="${product.image_url || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60'}" alt="${escapeHtml(product.name_ar)}">
                            <div class="product-badges">
                                ${product.discount_percent > 0 ? `<div class="badge badge-discount"><i class="fas fa-tag"></i> -${product.discount_percent}%</div>` : ''}
                                ${product.is_featured ? `<div class="badge badge-featured"><i class="fas fa-star"></i> مميز</div>` : ''}
                            </div>
                            <button class="wishlist-btn" onclick="toggleWishlist(${product.id}, this)">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>

                        <div class="product-info">
                            <div class="product-name">${escapeHtml(product.name_ar)}</div>
                            <div class="product-category">${product.category_ar || 'عام'}</div>
                            <div class="product-rating">
                                <i class="fas fa-star"></i> ${product.rating_average ? product.rating_average.toFixed(1) : '0'}
                                ${product.rating_count ? `(${product.rating_count} تقييم)` : ''}
                            </div>

                            <div class="product-price">
                                <span class="current-price">${discountedPrice.toFixed(2)}</span>
                                ${product.discount_percent > 0 ? `<span class="original-price">${product.price.toFixed(2)}</span>` : ''}
                            </div>

                            <div class="stock-status ${stockStatus}">${stockText}</div>

                            <div class="product-actions">
                                <button class="btn btn-primary" onclick="addToCart(${product.id})">
                                    <i class="fas fa-shopping-cart"></i> أضف للسلة
                                </button>
                                <button class="btn btn-secondary" onclick="viewProduct(${product.id})">
                                    <i class="fas fa-eye"></i> عرض
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            updateLoadMoreButton();
        }

        function showEmptyState(message) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <h3>لا توجد نتائج</h3>
                    <p>${message}</p>
                </div>
            `;
            document.getElementById('loadMoreBtn').style.display = 'none';
        }

        function loadMoreProducts() {
            currentPage++;
            displayProducts();
        }

        function updateLoadMoreButton() {
            const btn = document.getElementById('loadMoreBtn');
            const hasMore = currentPage * itemsPerPage < filteredProducts.length;
            btn.style.display = hasMore ? 'block' : 'none';
        }

        async function addToCart(productId) {
            try {
                if (!confirm('هل تريد إضافة هذا المنتج للسلة؟')) return;

                const res = await fetch('/api/products.php?action=add_to_cart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `product_id=${productId}&quantity=1`
                });

                const data = await res.json();
                if (data.success) {
                    SiteUX.showToast('تم إضافة المنتج للسلة بنجاح!', 'success');
                } else {
                    SiteUX.showToast(data.message || 'خطأ في الإضافة', 'error');
                }
            } catch (e) {
                SiteUX.showToast('يجب تسجيل الدخول أولاً', 'error');
            }
        }

        function viewProduct(productId) {
            window.location.href = `/shop.html?product=${productId}`;
        }

        function toggleWishlist(productId, button) {
            button.classList.toggle('active');
            const isActive = button.classList.contains('active');
            SiteUX.showToast(isActive ? 'تم الإضافة للمفضلة' : 'تم الحذف من المفضلة', 'success');
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
